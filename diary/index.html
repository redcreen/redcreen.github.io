        }

        }

        .nav-link {
            display: block;
            padding: 12px 24px;
            color: #555;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-link:hover {
            background: #f8f9fa;
            color: #333;
        }

        .nav-link.active {

            color: #1890ff;

        .welcome-card {

            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
            text-align: center;
        }

        .welcome-card h2 {
            font-size: 28px;
            color: #333;
            margin-bottom: 16px;
        }

        .welcome-card p {
            color: #666;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .welcome-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 32px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 600;
            color: #1890ff;
        }

        .stat-label {
            font-size: 14px;
            color: #888;
            margin-top: 4px;
        }

        /* 鍝嶅簲寮?*/
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            .content {
                margin-left: 0;
                padding: 20px;
            }
            .container {
                flex-direction: column;
            }
            .welcome-stats {
