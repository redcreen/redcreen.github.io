<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的转载收藏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .clip-list {
            list-style: none;
        }
        .clip-item {
            padding: 20px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        .clip-item:hover {
            background: #f8f9fa;
            border-radius: 8px;
        }
        .clip-item:last-child {
            border-bottom: none;
        }
        .clip-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .clip-title a {
            color: #333;
            text-decoration: none;
        }
        .clip-title a:hover {
            color: #667eea;
        }
        .clip-meta {
            font-size: 13px;
            color: #888;
        }
        .clip-meta a {
            color: #667eea;
            text-decoration: none;
        }
        .clip-meta a:hover {
            text-decoration: underline;
        }
        .badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-right: 8px;
        }
        .badge-v2 {
            background: #e8f5e9;
            color: #388e3c;
        }
        .count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 我的转载收藏</h1>
        <p class="subtitle">通过 Web Clipper 抓取的文章集合 <span class="count">2</span></p>
        
        <ul class="clip-list">
            <li class="clip-item">
                <div class="clip-title"><a href="openclaw-tesla-story-v2/">如何用OpenClaw一个月赚到特斯拉（全路径复盘）</a></div>
                <div class="clip-meta">
                    <span class="badge badge-v2">✨ 优化版</span>
                    <span class="badge">X</span>
                    <span>👤 OneHopeA9 (@onehopeA9)</span>
                    <span style="margin-left: 15px;">📅 2026-03-14</span>
                    <span style="margin-left: 15px;">👁️ 90.7万查看</span>
                    <br><br>
                    <span style="color: #388e3c;">✅ 包含本地保存的图片</span>
                </div>
            </li>
            <li class="clip-item">
                <div class="clip-title"><a href="openclaw-tesla-story/">如何用OpenClaw一个月赚到特斯拉（全路径复盘）- 原版</a></div>
                <div class="clip-meta">
                    <span class="badge">X</span>
                    <span>👤 OneHopeA9 (@onehopeA9)</span>
                    <span style="margin-left: 15px;">📅 2026-03-14</span>
                    <span style="margin-left: 15px;">👁️ 90.4万查看</span>
                    <br><br>
                    <span style="color: #999;">📄 截图版</span>
                </div>
            </li>
        </ul>
    </div>
</body>
</html>
